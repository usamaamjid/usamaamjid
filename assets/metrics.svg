<svg xmlns="http://www.w3.org/2000/svg" width="480" height="180" viewBox="0 0 480 180" fill="none" role="img" aria-label="Live metrics generating">
  <defs>
    <linearGradient id="mbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0b2531"/>
    </linearGradient>
  </defs>
  <rect width="480" height="180" rx="12" fill="url(#mbg)" stroke="#21506b" stroke-width="1"/>
  <text x="24" y="42" font-family="'JetBrains Mono',monospace" font-size="15" font-weight="700" fill="#36BCF7">📊 Live GitHub Metrics</text>
  <text x="24" y="78" font-family="'JetBrains Mono',monospace" font-size="12" fill="#9fb3c8">Self-generated · refreshes every 12h via GitHub Actions</text>
  <g>
    <circle cx="30" cy="120" r="5" fill="#36BCF7"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="52" cy="120" r="5" fill="#36BCF7"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="74" cy="120" r="5" fill="#36BCF7"><animate attributeName="opacity" values="0.2;1;0.2" dur="1.2s" begin="0.4s" repeatCount="indefinite"/></circle>
    <text x="92" y="125" font-family="'JetBrains Mono',monospace" font-size="12" fill="#6b8ba4">building your language + activity breakdown…</text>
  </g>
  <text x="24" y="160" font-family="'JetBrains Mono',monospace" font-size="11" fill="#5c7c92">no external server — never rate-limited</text>
</svg>

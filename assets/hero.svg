<svg xmlns="http://www.w3.org/2000/svg" width="850" height="200" viewBox="0 0 850 200" fill="none" role="img" aria-label="Usama Amjid — Backend and Distributed Systems Engineer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1622"/>
      <stop offset="55%" stop-color="#0f2233"/>
      <stop offset="100%" stop-color="#0a2f3a"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#36BCF7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#36BCF7" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#36BCF7" stop-opacity="0"/>
      <animate attributeName="x1" values="-1;1" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="0;2" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#8fdcff"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="850" height="200" rx="16" fill="url(#bg)"/>
  <rect width="850" height="200" rx="16" fill="url(#sheen)"/>

  <!-- faint grid -->
  <g stroke="#1c3a4a" stroke-width="1" opacity="0.5">
    <path d="M0 50 H850 M0 100 H850 M0 150 H850"/>
    <path d="M120 0 V200 M240 0 V200 M360 0 V200 M480 0 V200 M600 0 V200 M720 0 V200"/>
  </g>

  <!-- floating nodes -->
  <g fill="#36BCF7">
    <circle cx="70" cy="55" r="3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="795" cy="150" r="3"><animate attributeName="opacity" values="1;0.2;1" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="45" r="2.5"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="55" cy="150" r="2.5"><animate attributeName="opacity" values="1;0.3;1" dur="4s" repeatCount="indefinite"/></circle>
  </g>

  <!-- title -->
  <text x="60" y="92" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="url(#title)" filter="url(#glow)" letter-spacing="1">
    Usama Amjid
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>

  <!-- accent line -->
  <rect x="62" y="108" width="0" height="3" rx="1.5" fill="#36BCF7">
    <animate attributeName="width" values="0;300" dur="1.2s" begin="0.4s" fill="freeze"/>
  </rect>

  <!-- subtitle -->
  <text x="62" y="140" font-family="'JetBrains Mono','Consolas',monospace" font-size="19" font-weight="600" fill="#9fb3c8">
    Backend &amp; Distributed Systems Engineer
    <animate attributeName="opacity" values="0;1" dur="1s" begin="0.8s" fill="freeze"/>
  </text>

  <!-- tagline -->
  <text x="62" y="168" font-family="'JetBrains Mono','Consolas',monospace" font-size="13" fill="#5c7c92">
    APIs · Payments · Real-time · Agentic AI — reliable under real-world pressure
    <animate attributeName="opacity" values="0;0.9" dur="1s" begin="1.1s" fill="freeze"/>
  </text>
</svg>

name: Generate Metrics

on:
  schedule:
    - cron: "0 */12 * * *"   # refresh twice a day
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Activity + stats panel
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: assets/metrics.svg
          template: classic
          base: header, activity, repositories, metadata
          config_timezone: Asia/Karachi
          # NOTE: plugin_languages and plugin_habits are intentionally omitted —
          # they need a personal PAT (private-repo + deep-analysis scopes) that the
          # default GITHUB_TOKEN doesn't grant, so they render empty / "Unexpected error".
          # To re-enable: add a repo secret METRICS_TOKEN (classic PAT, repo scope),
          # set token above to ${{ secrets.METRICS_TOKEN }}, and restore the plugins.
